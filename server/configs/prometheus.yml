# === SERVER-SIDE: Prometheus Configuration ===
# Scrapes the OTel Collector's Prometheus exporter endpoint.
# The collector's deltatocumulative processor accumulates DELTA metrics from
# short-lived CLI processes into a running CUMULATIVE total.
#
# Architecture:
#   nipoppy CLI → OTel Collector (OTLP/gRPC 4317) → deltatocumulative → Prometheus exporter (8889)
#   Prometheus scrapes :8889 every 15s

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'nipoppy-telemetry'

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
