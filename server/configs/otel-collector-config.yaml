# === SERVER-SIDE: OpenTelemetry Collector Configuration ===
# Standard OTel pattern for short-lived CLI processes:
#
#   nipoppy CLI (DELTA=1/run) → Collector → deltatocumulative → Prometheus
#
# The deltatocumulative processor accumulates DELTA increments from separate
# CLI process runs into a running CUMULATIVE total in-memory.
# Run 1: delta=1 → cumulative=1
# Run 2: delta=1 → cumulative=2
# Run 3: delta=1 → cumulative=3
#
# Prometheus scrapes the CUMULATIVE value and sum() gives the correct total.
# State is in-memory in the collector (resets on collector restart).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256

  # Accumulate DELTA Sum metrics into a running CUMULATIVE total.
  # This is the standard OTel approach for short-lived CLI processes.
  # Available in opentelemetry-collector-contrib >= v0.107.0.
  deltatocumulative:
    max_stale: 168h   # Drop series not updated for 7 days
    max_streams: 100000

  batch:
    timeout: 1s
    send_batch_size: 100

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: nipoppy
    metric_expiration: 168h
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info

  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, deltatocumulative, batch]
      exporters: [prometheus, debug]
