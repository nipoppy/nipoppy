# See https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-issue-forms
name: Documentation issue

description: Report an issue or suggest improvements to the documentation

title: "[DOC] "

labels: ["T.3 - Documentation"]

type: "Documentation"

body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description:
        Please search to see if a similar already exists.
      options:
        - label: I have searched the existing issues

  - type: textarea
    attributes:
      label: Missing or unclear documentation
      description: |
        Something is missing / unclear about **X**.

        You are confused about how to do **Y**.

        It is not clear how / why the code does **Z**.

        That means that we can improve the code or the documentation.
      placeholder: Tell us more.
    validations:
      required: false
