# See https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/syntax-for-issue-forms
name: Feature request

description: Suggest an idea for this project

title: "[ENH] "

labels: ["T.1 - Enhancement"]

type: "Enhancement"

body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description:
        Please search to see if an issue already exists for the feature you
        want.
      options:
        - label: I have searched the existing issues
    validations:
        required: true

  - type: textarea
    attributes:
      label: New feature
      description: Describe the feature you want and why you think it is useful.
    validations:
      required: true
